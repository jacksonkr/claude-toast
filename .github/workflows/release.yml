name: release

# Push a tag like v0.1.0 to build native binaries on each OS and attach them
# to a GitHub Release. We build natively per-runner rather than cross-compiling
# because the tray library uses cgo on macOS and Linux.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: claude-toast-linux-amd64
          - os: macos-latest
            asset: claude-toast-darwin-arm64
          - os: windows-latest
            asset: claude-toast-windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          go build -o claude-toast .
          tar czf ${{ matrix.asset }}.tar.gz claude-toast README.md LICENSE

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          go build -o claude-toast.exe .
          go build -ldflags "-H windowsgui" -o claude-toast-tray.exe .
          Compress-Archive -Path claude-toast.exe, claude-toast-tray.exe, README.md, LICENSE -DestinationPath ${{ matrix.asset }}.zip

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.zip

      # Also publish the bare Windows executables, for people who just want to
      # download an .exe rather than unzip an archive.
      - name: Attach raw Windows binaries
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-toast.exe
            claude-toast-tray.exe

  # After the binaries are published, bump the Scoop manifest + Homebrew formula
  # so `scoop install` / `brew install` always resolve to this version. Commits
  # back to main with the default token (same-repo push, no PAT needed).
  manifests:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Update Scoop + Homebrew manifests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          mkdir -p dist
          gh release download "$tag" --dir dist --clobber
          win=$(sha256sum dist/claude-toast-windows-amd64.zip | cut -d' ' -f1)
          mac=$(sha256sum dist/claude-toast-darwin-arm64.tar.gz | cut -d' ' -f1)
          lin=$(sha256sum dist/claude-toast-linux-amd64.tar.gz | cut -d' ' -f1)
          python3 packaging/update.py "$ver" "$win" "$mac" "$lin"
          rm -rf dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/
          git diff --cached --quiet || git commit -m "packaging: update Scoop + Homebrew manifests for $tag"
          git push origin main
