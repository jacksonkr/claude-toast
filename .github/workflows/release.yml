name: release

# Push a tag like v0.1.0 to build native binaries on each OS and attach them
# to a GitHub Release. We build natively per-runner rather than cross-compiling
# because the tray library uses cgo on macOS and Linux.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: claude-toast-linux-amd64
          - os: macos-latest
            asset: claude-toast-darwin-arm64
          - os: windows-latest
            asset: claude-toast-windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          go build -o claude-toast .
          tar czf ${{ matrix.asset }}.tar.gz claude-toast README.md LICENSE

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          go build -o claude-toast.exe .
          go build -ldflags "-H windowsgui" -o claude-toast-tray.exe .
          Compress-Archive -Path claude-toast.exe, claude-toast-tray.exe, README.md, LICENSE -DestinationPath ${{ matrix.asset }}.zip

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.zip
